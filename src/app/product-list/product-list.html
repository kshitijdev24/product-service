<p>product-list works!</p>
<table border="1">
    @for(product of productArr; track $index){
        <tr>
            <td>{{product}}</td>
        </tr>
    }
</table>
<br><br>

<h1>Add Product</h1>
<input type="text" [(ngModel)]="productName"/>
<br><br>
<button (click)="addNewProduct()">Add product</button>
